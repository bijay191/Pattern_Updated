<!DOCTYPE html>
<html>
<head>
    <title>Pattern & Layout Finder</title>
</head>
<body>
    <h1>Pattern & Layout Finder</h1>

    <form method="POST">
        {% csrf_token %}

        <label for="file_id">Select File:</label>
        <select name="file_id" id="file_id">
            <option value="">-- Select from table --</option>
            {% for file in files %}
                <option value="{{ file.id }}">{{ file.filename }}</option>
            {% endfor %}
        </select>

        <br><br>

        <label for="manual_filename">Search file:</label>
        <input type="text" name="manual_filename" id="manual_filename" style="width: 500px;"
               placeholder="Type filename here">

        <br><br>

        <button type="submit">Generate</button>
    </form>

    {% if error_message %}
    <p style="color: red;"><strong>{{ error_message }}</strong></p>
    {% endif %}

    <hr>
    <h2>Output:</h2>

    <div style="border:1px solid #ccc; padding:15px; width:95%;">
        <p><strong>Filename:</strong><br>{{ filename|default:"UNKNOWN" }}</p>

        <p><strong>Generated Pattern:</strong><br>{{ generated_pattern|default:"UNKNOWN" }}</p>

        <p><strong>Layout ID:</strong><br>{{ layout_id|default:"UNKNOWN" }}</p>
    </div>
</body>
</html>
