<!DOCTYPE html>
<html>
<head>
    <title>Pattern Generator</title>
</head>
<body>

<h2>Pattern & Layout Finder</h2>

<form method="POST">
    {% csrf_token %}

    <label>Select File:</label>
    <select name="file_id">
        {% for f in files %}
            <option value="{{ f.id }}">
                {{ f.filename }}
            </option>
        {% endfor %}
    </select>

    <br><br>
    <button type="submit">Generate</button>
</form>

<hr>

{% if generated_pattern %}
<hr>

<h3>Output:</h3>

<div style="border:1px solid #ccc; padding:15px; width:60%; background:#f9f9f9;">

    <p><strong>Filename:</strong><br>
    {{ selected_filename }}</p>

    <p><strong>Generated Pattern:</strong><br>
    {{ generated_pattern }}</p>

    <p><strong>Layout ID:</strong><br>
    {{ layout_id }}</p>

</div>

{% endif %}

</body>
</html>
