<!DOCTYPE html>
<html>
<head>
    <title>Pattern Generator</title>
</head>
<body>

<h2>Pattern & Layout Finder</h2>

<form method="POST">
    {% csrf_token %}

    <label>Select File:</label>
    <select name="file_id">
        {% for f in files %}
            <option value="{{ f.id }}">
                {{ f.filename }}
            </option>
        {% endfor %}
    </select>

    <br><br>
    <button type="submit">Generate</button>
</form>

<hr>

{% if generated_pattern %}
    <h3>Generated Pattern:</h3>
    <p>{{ generated_pattern }}</p>
{% endif %}

{% if layout_id %}
    <h3>Layout ID:</h3>
    <p>{{ layout_id }}</p>
{% endif %}

</body>
</html>
